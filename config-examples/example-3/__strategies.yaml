strategies:
  merge_common_ec2_to_teams_ec2:
    operations:
      - for_each:
          iterator: $directory_data
          actions:
            - inject:
              - $common
              - $each_value.ec2
            - add_parent: ec2
    variable_definitions:
      common:
        path: ./common/
        type: data_with_key_from_object_field
        source_object_path: ec2
        destination_object_path: ''
      directory_data:
        path: ./teams/{team}/
        type: data_with_key_from_path